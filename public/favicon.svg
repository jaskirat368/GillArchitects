<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Deep Charcoal Blue Base -->
  <rect width="512" height="512" fill="#202833" />
  
  <!-- Subtle Blueprint Architectural Grid -->
  <g stroke="#EAE0C8" stroke-width="1" stroke-opacity="0.08">
    <line x1="32" y1="0" x2="32" y2="512" />
    <line x1="64" y1="0" x2="64" y2="512" />
    <line x1="96" y1="0" x2="96" y2="512" />
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="160" y1="0" x2="160" y2="512" />
    <line x1="192" y1="0" x2="192" y2="512" />
    <line x1="224" y1="0" x2="224" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="288" y1="0" x2="288" y2="512" />
    <line x1="320" y1="0" x2="320" y2="512" />
    <line x1="352" y1="0" x2="352" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
    <line x1="416" y1="0" x2="416" y2="512" />
    <line x1="448" y1="0" x2="448" y2="512" />
    <line x1="480" y1="0" x2="480" y2="512" />

    <line x1="0" y1="32" x2="512" y2="32" />
    <line x1="0" y1="64" x2="512" y2="64" />
    <line x1="0" y1="96" x2="512" y2="96" />
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="160" x2="512" y2="160" />
    <line x1="0" y1="192" x2="512" y2="192" />
    <line x1="0" y1="224" x2="512" y2="224" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="288" x2="512" y2="288" />
    <line x1="0" y1="320" x2="512" y2="320" />
    <line x1="0" y1="352" x2="512" y2="352" />
    <line x1="0" y1="384" x2="512" y2="384" />
    <line x1="0" y1="416" x2="512" y2="416" />
    <line x1="0" y1="448" x2="512" y2="448" />
    <line x1="0" y1="480" x2="512" y2="480" />
  </g>

  <!-- Drafting Construction Lines -->
  <g stroke="#EAE0C8" stroke-width="2" stroke-opacity="0.25">
    <!-- Main Frame -->
    <line x1="64" y1="0" x2="64" y2="512" />
    <line x1="448" y1="0" x2="448" y2="512" />
    <line x1="0" y1="64" x2="512" y2="64" />
    <line x1="0" y1="448" x2="512" y2="448" />
    
    <!-- Inner guiding lines for precision look -->
    <line x1="160" y1="0" x2="160" y2="512" stroke-dasharray="8 8" />
    <line x1="192" y1="0" x2="192" y2="512" stroke-dasharray="8 8" />
    <line x1="320" y1="0" x2="320" y2="512" stroke-dasharray="8 8" />
    <line x1="352" y1="0" x2="352" y2="512" stroke-dasharray="8 8" />
    
    <line x1="0" y1="160" x2="512" y2="160" stroke-dasharray="8 8" />
    <line x1="0" y1="192" x2="512" y2="192" stroke-dasharray="8 8" />
    <line x1="0" y1="320" x2="512" y2="320" stroke-dasharray="8 8" />
    <line x1="0" y1="352" x2="512" y2="352" stroke-dasharray="8 8" />
  </g>

  <!-- Architectural 'G' Monogram Blocks (Pearl #EAE0C8) -->
  <g fill="#EAE0C8">
    <!-- Left Pillar -->
    <rect x="64" y="64" width="96" height="384" />
    
    <!-- Top Beam -->
    <rect x="192" y="64" width="256" height="96" />
    
    <!-- Bottom Beam -->
    <rect x="192" y="352" width="256" height="96" />
    
    <!-- Right Pillar -->
    <rect x="352" y="192" width="96" height="128" />
    
    <!-- Center Beam -->
    <rect x="192" y="192" width="128" height="96" />
  </g>
</svg>
